<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NKR WORKS – Product Range</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --accent: #e60023;
      --light: #f5f5f5;
      --max-width: 1080px;
      --radius: 10px;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }

    header {
      border-bottom: 1px solid #eee;
      padding: 18px 20px;
    }

    .logo {
      font-weight: 700;
      letter-spacing: 0.12em;
      font-size: 14px;
    }
    .logo span { color: var(--accent); }

    main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    h1 {
      font-size: 32px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .section-sub {
      color: var(--muted);
      margin-bottom: 40px;
      font-size: 14px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 28px;
    }

    .product-card {
      background: var(--light);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      border: 1px solid #eaeaea;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
    }

    .product-card img {
      width: 100%;
      border-radius: var(--radius);
      margin-bottom: 14px;
    }

    .product-card h3 {
      margin: 8px 0 4px;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .product-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .back-link {
      display: inline-block;
      margin-top: 40px;
      font-size: 13px;
      text-decoration: none;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    footer {
      border-top: 1px solid #eee;
      padding: 18px 20px 30px;
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">NKR <span>WORKS</span></div>
  </header>

  <main>
    <h1>Product Range</h1>
    <p class="section-sub">Browse our current models and prices.</p>

    <div class="product-grid">

      <div class="product-card">
        <img src="images/product1.jpg" alt="N Scale Bogie Pack">
        <h3>N‑Scale container flat bed</h3>
        <p>$35.00</p>
      </div>

      <div class="product-card">
        <img src="images/product2.jpg" alt="Coupler Set">
        <h3>N-Scale Refrigeration Flat Bed </h3>
        <p>$35.00</p>
      </div>

      <div class="product-card">
        <img src="images/product3.jpg" alt="HO‑Scale Wagon Kit">
        <h3>N-Scale flat bed with Tank</h3>
        <p>$35.00</p>
      </div>

    </div>

    <a href="index.html" class="back-link">← Back to Home</a>

  </main>

  <footer>
    © NKR WORKS · Precision‑Engineered Scale Models
  </footer>

</body>
</html>
